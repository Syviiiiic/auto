version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: autoads_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - autoads_network
    volumes:
      - ./media:/app/media

  postgres:
    image: postgres:15-alpine
    container_name: autoads_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_USER=autobot
      - DB_PASSWORD=autobot123
      - DB_NAME=auto_ads
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - autoads_network

  redis:
    image: redis:7-alpine
    container_name: autoads_redis
    restart: unless-stopped
    networks:
      - autoads_network

  nginx:
    image: nginx:alpine
    container_name: autoads_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html:ro
      - ./media:/app/media:ro
    depends_on:
      - api
    networks:
      - autoads_network

volumes:
  postgres_data:

networks:
  autoads_network:
    driver: bridge
