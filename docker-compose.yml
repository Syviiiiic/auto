version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: auto_ads_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - auto_ads_postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - auto_auto_ads_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: auto_ads_redis
    ports:
      - "6379:6379"
    volumes:
      - auto_ads_redis_data:/data
    networks:
      - auto_auto_ads_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: auto_ads_api
    environment:
      DATABASE_URL: postgresql://auto:14811481a@postgres:5432/avto
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - auto_auto_ads_network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: auto_ads_web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - auto_auto_ads_network
    restart: unless-stopped

networks:
  auto_auto_ads_network:
    driver: bridge

volumes:
  auto_ads_postgres_data:
  auto_ads_redis_data:
