version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: ../Dockerfile.api
    container_name: autoads_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:SecurePass123!@postgres:5432/avto
      - JWT_SECRET=MySuperSecretKeyForAutoAdsProject2024
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    networks:
      - autoads_network
    volumes:
      - ./media:/app/media

  postgres:
    image: postgres:15-alpine
    container_name: autoads_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=avto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autoads_network

  redis:
    image: redis:7-alpine
    container_name: autoads_redis
    restart: unless-stopped
    networks:
      - autoads_network

  nginx:
    image: nginx:alpine
    container_name: autoads_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html:ro
      - ./media:/app/media:ro
    depends_on:
      - api
    networks:
      - autoads_network

volumes:
  postgres_data:

networks:
  autoads_network:
    driver: bridge
