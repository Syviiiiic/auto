version: '3.8'

services:
  api:
    build: ./api
    container_name: autoads_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - autoads_network
    volumes:
      - ./media:/app/media

  postgres:
    image: postgres:15-alpine
    container_name: autoads_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autoads_network

  redis:
    image: redis:7-alpine
    container_name: autoads_redis
    restart: unless-stopped
    networks:
      - autoads_network

  web:
    build: ./web
    container_name: autoads_web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - autoads_network

  nginx:
    image: nginx:alpine
    container_name: autoads_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web:/usr/share/nginx/html:ro
      - ./media:/app/media:ro
    depends_on:
      - api
      - web
    networks:
      - autoads_network

volumes:
  postgres_data:

networks:
  autoads_network:
    driver: bridge
