services:
  db:
    image: postgres:15-alpine
    container_name: autoads_db
    environment:
      POSTGRES_DB: ${DB_NAME:-autoads}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-autoads}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - autoads_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: autoads_backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-autoads}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key}
      - DEBUG=${DEBUG:-False}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/__pycache__
    restart: unless-stopped
    networks:
      - autoads_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: autoads_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_BOT_NAME=${BOT_NAME:-YourBotName}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - autoads_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: autoads_bot
    env_file: .env
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBAPP_URL=${WEBAPP_URL}
      - ADMIN_IDS=${ADMIN_IDS}
      - API_URL=http://backend:8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-autoads}
    depends_on:
      - db
      - backend
    restart: unless-stopped
    networks:
      - autoads_network

volumes:
  postgres_data:

networks:
  autoads_network:
    driver: bridge
