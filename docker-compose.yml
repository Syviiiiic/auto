services:
  postgres:
    image: postgres:15-alpine
    container_name: auto_ads_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-avto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-14811481a}
      POSTGRES_DB: ${DB_NAME:-avto_ads}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - auto_ads_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-avto}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto_ads_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auto_ads_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: auto_ads_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-avto}:${DB_PASSWORD:-14811481a}@postgres:5432/${DB_NAME:-avto_ads}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-5QY7Nnt17PEDparg6DPV4RTI8sAcYCbn}
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app/api
      - ./database:/app/database
      - ./logs:/app/logs
      - uploads_data:/app/uploads
    networks:
      - auto_ads_network
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: auto_ads_web
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx/templates:/etc/nginx/templates
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    networks:
      - auto_ads_network
    restart: unless-stopped
    depends_on:
      - api


networks:
  auto_ads_network:
    driver: bridge

volumes:
  postgres_data:
    name: auto_ads_postgres_data
  redis_data:
    name: auto_ads_redis_data
  uploads_data:
    name: auto_ads_uploads_data
