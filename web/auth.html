<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Auto Ads</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-wrap { max-width: 420px; margin: 2rem auto; padding: 1rem; }
        .auth-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .auth-tabs button { flex: 1; padding: 0.75rem; border: none; background: #eee; cursor: pointer; border-radius: 8px; font-size: 1rem; }
        .auth-tabs button.active { background: #2563eb; color: #fff; }
        .auth-panel { display: none; }
        .auth-panel.active { display: block; }
        .auth-error { color: #b91c1c; margin-bottom: 1rem; font-size: 0.9rem; }
        .auth-hint { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <button class="back-btn" onclick="location.href='index.html'">←</button>
            <h1>Аккаунт</h1>
            <span style="width:40px"></span>
        </header>

        <div class="auth-wrap">
            <div class="auth-tabs">
                <button type="button" id="tabLogin" class="active">Вход</button>
                <button type="button" id="tabRegister">Регистрация</button>
            </div>

            <div id="err" class="auth-error" style="display:none;"></div>

            <div id="panelLogin" class="auth-panel active">
                <form id="formLogin" class="ad-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required autocomplete="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="loginPassword" required autocomplete="current-password" minlength="8">
                    </div>
                    <button type="submit" class="submit-btn">Войти</button>
                </form>
            </div>

            <div id="panelRegister" class="auth-panel">
                <form id="formRegister" class="ad-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="regPassword" required autocomplete="new-password" minlength="8">
                        <div class="auth-hint">Не менее 8 символов</div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" id="regFirst" placeholder="Иван">
                        </div>
                        <div class="form-group">
                            <label>Фамилия</label>
                            <input type="text" id="regLast" placeholder="Иванов">
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const nextUrl = params.get('next') || 'index.html';

        function showErr(msg) {
            const el = document.getElementById('err');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        document.getElementById('tabLogin').addEventListener('click', () => {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('panelLogin').classList.add('active');
            document.getElementById('panelRegister').classList.remove('active');
            showErr('');
        });
        document.getElementById('tabRegister').addEventListener('click', () => {
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('panelRegister').classList.add('active');
            document.getElementById('panelLogin').classList.remove('active');
            showErr('');
        });

        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            showErr('');
            try {
                await api.auth.login(
                    document.getElementById('loginEmail').value.trim(),
                    document.getElementById('loginPassword').value
                );
                window.location.href = nextUrl;
            } catch (err) {
                showErr(err.message || 'Ошибка входа');
            }
        });

        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            showErr('');
            try {
                await api.auth.register(
                    document.getElementById('regEmail').value.trim(),
                    document.getElementById('regPassword').value,
                    document.getElementById('regFirst').value.trim() || null,
                    document.getElementById('regLast').value.trim() || null
                );
                window.location.href = nextUrl;
            } catch (err) {
                showErr(err.message || 'Ошибка регистрации');
            }
        });
    </script>
</body>
</html>
